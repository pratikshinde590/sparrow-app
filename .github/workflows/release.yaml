
name: Semantic Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.8'

      - name: Install Windows SDK
        run: Invoke-WebRequest -Uri https://aka.ms/winsdk/10/latest/SdkSetup.exe -OutFile $env:TEMP\SdkSetup.exe
        shell: powershell

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 3.1

      - name: Install dependencies
        run: |
            yarn cache clean
            npm install -g pnpm
            # pnpm install
            yarn install
            # yarn tauri build --debug
      - name: Build Tauri App
        run: |
            $TAURI_PRIVATE_KEY="${{ secrets.TAURI_PRIVATE_KEY }}"
            $TAURI_KEY_PASSWORD="${{ secrets.TAURI_KEY_PASSWORD }}" 
            yarn tauri build --debug
        env:
           TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
           TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
           GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Extract Secret Value
        id: extract_secret
        run: |
         $SECRET_VALUE = Get-Content "D:/a/sparrow_app/sparrow_app/src-tauri/target/debug/bundle/msi/sparrow-app_0.0.0_x64_en-US.msi.zip.sig"
         echo "::set-output name=secret_value::$SECRET_VALUE"
        # Extracting the secret value from the specified file
        

      - name: Update Secret
        run: |
         $SECRET_VALUE = ${{ steps.extract_secret.outputs.secret_value }}
         $REPO_FULLNAME = "${{ github.repository }}"
         $TOKEN = "${{ secrets.MY_GITHUB_TOKEN }}"
                Invoke-RestMethod -Uri "https://api.github.com/repos/$REPO_FULLNAME/actions/secrets/NEW_SECRET_VALUE" -Method Put -Headers @{
             "Authorization" = "token $TOKEN"
            "Accept" = "application/vnd.github.v3+json"
            } -Body (@{"encrypted_value" = "$SECRET_VALUE"; "key_id" = "$REPO_FULLNAME"} | ConvertTo-Json)


  
