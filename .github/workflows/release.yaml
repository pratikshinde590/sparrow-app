name: Update Secret in sparrow-api

on:
  push:
    branches:
      - main

jobs:
  update-secret:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Get Public Key
      id: get-key
      run: |
        $url = "https://api.github.com/repos/pratikshinde590/sparrow_app/actions/secrets/public-key"
        $headers = @{
          "Accept" = "application/vnd.github+json"
          "Authorization" = "token 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"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        # Make the request using Invoke-WebRequest
        $response = Invoke-WebRequest -Uri $url -Headers $headers

        # Extract the public key and key ID from the response JSON
        $publicKey = $response.Content | ConvertFrom-Json
        $publicKeyBase64 = $publicKey.key
        $keyId = $publicKey.key_id

        # Set environment variables for later use
        echo "PUBLIC_KEY=$publicKeyBase64" >> $env:GITHUB_ENV
        echo "KEY_ID=$keyId" >> $env:GITHUB_ENV

      shell: pwsh
