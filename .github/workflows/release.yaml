name: Semantic Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.8'

      - name: Install Windows SDK
        run: Invoke-WebRequest -Uri https://aka.ms/winsdk/10/latest/SdkSetup.exe -OutFile $env:TEMP\SdkSetup.exe
        shell: powershell

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 3.1

      - name: Install dependencies
        run: |
            yarn cache clean
            npm install -g pnpm
            # pnpm install
            yarn install
            # yarn tauri build --debug
      - name: Build Tauri App
        run: |
            $TAURI_PRIVATE_KEY="${{ secrets.TAURI_PRIVATE_KEY }}"
            $TAURI_KEY_PASSWORD="${{ secrets.TAURI_KEY_PASSWORD }}" 
            yarn tauri build --debug
        env:
           TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
           TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
           GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Print file content
        run: Get-Content D:/a/sparrow-app/sparrow-app/src-tauri/target/debug/bundle/msi/sparrow-app_0.0.0_x64_en-US.msi.zip.sig

      - name: Print file content
        run: Get-Content D:/a/sparrow-app/sparrow-app/src-tauri/target/debug/bundle/nsis/sparrow-app_0.0.0_x64-setup.nsis.zip.sig

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
   
      - name: Install Dependencies
        run: |
           pip install PyNaCl requests

      - name: Run Python Script
        run: python script.py  # This command runs your Python script
        env:
          INPUT_REPOSITORY_OWNER: ${{ secrets.REPOSITORY_OWNER }}
          INPUT_REPOSITORY_NAME: ${{ secrets.REPOSITORY_NAME }}
          INPUT_SECRET_NAME: ${{ secrets.SECRET_NAME }}
          INPUT_SECRET_NAME_2: ${{ secrets.SECRET_NAME_2 }}
          INPUT_NEW_SECRET_VALUE: ${{ secrets.NEW_SECRET_VALUE }}
          INPUT_NEW_SECRET_VALUE_2: ${{ secrets.NEW_SECRET_VALUE_2 }}
          INPUT_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        
