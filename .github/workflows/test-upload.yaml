name: Download and List MSI Files from S3

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest  # This specifies that the job should run on Windows
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Get domain from secret
      id: get_domain
      run: echo "::set-output name=DOMAIN::${{ secrets.UPDATER_DOMAIN }}"

    - name: Set updater endpoint
      id: set_updater_endpoint
      run: echo "::set-output name=UPDATER_ENDPOINT::https://${{ steps.get_domain.outputs.DOMAIN }}/updater/{{target}}/{{arch}}/{{current_version}}"

    - name: Read tauri.conf.json
      id: read_file
      run: |
        $content = Get-Content tauri.conf.json
        Write-Output $content
      shell: powershell

    - name: Update updater endpoint in JSON file
      run: |
        (Get-Content tauri.conf.json) -replace '"https://api.sparrowapp.dev/updater/{{target}}/{{arch}}/{{current_version}}"', '"${{ steps.set_updater_endpoint.outputs.UPDATER_ENDPOINT }}"' | Set-Content tauri.conf.json
      shell: powershell

    - name: Print updated tauri.conf.json
      run: |
        $content = Get-Content tauri.conf.json
        Write-Output $content
      shell: powershell
