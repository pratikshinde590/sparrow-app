name: Update Updater Endpoint

on:
  push:
    branches:
      - main

jobs:
  update_updater_endpoint:
    name: Update Updater Endpoint
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Get domain from secret
        id: get_domain
        run: echo "::set-output name=DOMAIN::${{ secrets.UPDATER_DOMAIN }}"

      - name: Set updater endpoint
        id: set_updater_endpoint
        run: echo "::set-output name=UPDATER_ENDPOINT::https://${{ steps.get_domain.outputs.DOMAIN }}/updater/{{target}}/{{arch}}/{{current_version}}"

      - name: Read tauri.conf.json
        id: read_file
        run: |
          $content = Get-Content src-tauri/tauri.conf.json -Raw
          Write-Output $content
        shell: powershell

      - name: Update updater endpoint in JSON file
        run: |
          $content = Get-Content src-tauri/tauri.conf.json -Raw
          $newContent = $content -replace '"https://api.sparrowapp.dev/updater/{{target}}/{{arch}}/{{current_version}}"', '"${{ steps.set_updater_endpoint.outputs.UPDATER_ENDPOINT }}"'
          Set-Content -Path src-tauri/tauri.conf.json -Value $newContent
        shell: powershell

      - name: Print updated tauri.conf.json
        run: |
          $content = Get-Content src-tauri/tauri.conf.json -Raw
          Write-Output $content
        shell: powershell

