name: Test gist

on:
  push:
    branches:
      - main

jobs:
  test_deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy
      uses: exuanbo/actions-deploy-gist@v1
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        gist_id: f0eb95cb30612f6e9ac3e83057f0c920
        file_path: sparrow-app_1.0.0_x64-setup.exe
        file_type: .exe file
