name: AzCopy Workflow

on:
  push:
    branches:
      - main

jobs:
  azcopy_job:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2


      - name: Download and install AzCopy
        run: |
          Invoke-WebRequest -Uri https://aka.ms/downloadazcopy-v10-linux -OutFile azcopy.tar.gz
          Expand-Archive -Path azcopy.tar.gz -DestinationPath .\azcopy
          Move-Item -Path .\azcopy\azcopy.exe -Destination C:\Windows\System32\
          Remove-Item azcopy.tar.gz -Force
          Remove-Item -Path .\azcopy -Recurse -Force


      - name: Login to Azure
        run: azcopy login --tenant-id 40c986a0-6b01-47a2-bc81-405e7fa011a7

      - name: Copy files to Azure Data Lake Storage Gen2
        run: |
          azcopy copy 'src-tauri/src' "${{ secrets.MYSTORAGEACCOUNT }}" --include-pattern '*.exe' --recursive=true
        env:
          AZCOPY_SPA_CLIENT_SECRET: ${{ secrets.AZCOPY_SPA_CLIENT_SECRET }}
