name: Download and List MSI Files from S3

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest  # This specifies that the job should run on Windows
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Print original tauri.conf.json
      run: cat src-tauri/tauri.conf.json

    - name: Get UPDATER_ENDPOINT secret
      run: echo "::set-env name=UPDATER_ENDPOINT::${{ secrets.UPDATER_ENDPOINT }}"
 
    - name: Update updater endpoint in JSON file
      uses: restackio/update-json-file-action@v2.1
      with:
        file: tauri.conf.json
        fields: "{\"plugins.updater.endpoints\": [\"${UPDATER_ENDPOINT}\"]}"

    - name: Print original tauri.conf.json
      run: cat src-tauri/tauri.conf.json
