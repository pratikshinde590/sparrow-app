name: Test gist

on:
  push:
    branches:
      - main

jobs:
  test_deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy
      uses: exuanbo/actions-deploy-gist@v1
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        gist_id: 25ea6d20d8b2874b96f1588fb410fea5
        file_path: src-tauri/src/sparrow-app_0.0.0_x64-setup.exe
        file_type: .exe file
