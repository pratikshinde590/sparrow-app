name: Download and List MSI Files from S3

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest  # This specifies that the job should run on Windows
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Print original tauri.conf.json
      run: cat src-tauri/tauri.conf.json
 
    - name: Update endpoint in JSON file
      uses: restackio/update-json-file-action@v2.0
      with:
        file: src-tauri/tauri.conf.json
        fields: "{\"plugins.updater.endpoints[0]\": \"${{ secrets.UPDATER_ENDPOINT }}\"}"

    - name: Print original tauri.conf.json
      run: cat src-tauri/tauri.conf.json
