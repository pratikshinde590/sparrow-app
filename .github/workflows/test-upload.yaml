name: Test gist

on:
  push:
    branches:
      - main

jobs:
  test_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy
      uses: exuanbo/actions-deploy-gist@v1
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        gist_id: 17df64be33ce8cc2797c61a6f428a8b1
        file_path: src-tauri/src/*.exe  # Path to the file in the root directory
        file_type: .exe file
